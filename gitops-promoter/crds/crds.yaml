                    properties:
                      clusterName:
                        description: |-
                          ClusterName is the name of the cluster that the application manifest is deployed to. An empty string indicates
                          the local cluster. There is no minimum length, since the local cluster is represented by an empty string.
                        type: string
                      environment:
                        description: Environment is the syncSource.targetBranch of the Argo CD application (in effect, its environment).
                        minLength: 1
                        type: string
                      lastTransitionTime:
                        description: LastTransitionTime is the last time the phase transitioned.
                        format: date-time
                        type: string
                      name:
                        description: Name is the name of the Argo CD application.
                        maxLength: 253
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
                        type: string
                      namespace:
                        description: Namespace is the namespace of the Argo CD application.
                        maxLength: 63
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                        type: string
                      phase:
                        description: Phase is the current phase of the commit status.
                        enum:
                          - pending
                          - success
                          - failure
                        type: string
                      sha:
                        description: |-
                          Sha is the commit SHA that the application is synced to.
                          This field is only populated when the application's sync status is Synced.
                          When the sync status is OutOfSync or Unknown, this field will be empty because
                          Status.Sync.Revision may contain a branch name instead of a SHA.
                          Supports both SHA-1 (40 chars) and SHA-256 (64 chars) Git hash formats.
                        maxLength: 64
                        pattern: ^(|[a-f0-9]{40}|[a-f0-9]{64})$
                        type: string
                    required:
                      - clusterName
                      - environment
                      - name
                      - namespace
                      - phase
                      - sha
                    type: object
                  type: array
                conditions:
                  description: Conditions Represents the observations of the current state.
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                observedGeneration:
                  description: |-
                    ObservedGeneration is the .metadata.generation that this status was reconciled from.
                    Because status is written via Server-Side Apply with ForceOwnership (which has no
                    optimistic-concurrency check), this field is the canonical way to detect stale
                    status writes: compare status.observedGeneration with metadata.generation.
                  format: int64
                  type: integer
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
